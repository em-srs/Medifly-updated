server.port=5000
spring.application.name=medifly-backend

# Datasource Configuration (Primary: PostgreSQL via env vars, Fallback: In-memory H2 PostgreSQL Mode)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:medifly;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Access via http://localhost:5000/h2-console when in dev mode)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Security
jwt.secret=supersecretjwtkey_for_medifly_must_be_at_least_256_bits_long_for_hs256_algorithm
jwt.expiration.ms=604800000

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.medifly=DEBUG
